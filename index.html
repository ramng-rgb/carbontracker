<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terrasense - Carbon Footprint Tracker</title>
  <!-- SEO Tags -->
  <meta name="description" content="Track, calculate, and systematically reduce your carbon footprint with Terrasense. Leverage smart IoT simulators and AI-driven coaching tips.">
  <meta name="keywords" content="carbon footprint tracker, climate change, personal carbon audit, sustainability pledges, carbon offset credits, smart grid hours">
  
  <!-- Styling Sheet -->
  <link rel="stylesheet" href="styles.css">
  
  <!-- FontAwesome Icons & Google Fonts via CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Main Grid Wrapper -->
  <div class="app-container">
    
    <!-- Vertical Sidebar navigation -->
    <aside class="app-sidebar">
      <div class="brand">
        <span class="brand-logo">🌎</span>
        <span class="brand-name">Terrasense</span>
        <span class="pro-badge">Pro</span>
      </div>
      
      <ul class="sidebar-menu">
        <li class="sidebar-menu-item active" data-route="#dashboard" id="menu-dashboard">
          <span class="menu-icon">📊</span> Overview
        </li>
        <li class="sidebar-menu-item" data-route="#calculator" id="menu-calculator">
          <span class="menu-icon">🎛️</span> Calculator
        </li>
        <li class="sidebar-menu-item" data-route="#tracker" id="menu-tracker">
          <span class="menu-icon">✏️</span> Habit Tracker
        </li>
        <li class="sidebar-menu-item" data-route="#aiChatTab" id="menu-aichat">
          <span class="menu-icon">🤖</span> AI Eco-Coach
        </li>
        <li class="sidebar-menu-item" data-route="#planner" id="menu-planner">
          <span class="menu-icon">🌱</span> Action Planner
        </li>
        
        <div class="sidebar-divider"></div>
        <div class="sidebar-pro-header">Pro Features</div>
        
        <li class="sidebar-menu-item" data-route="#marketplace" id="menu-marketplace">
          <span class="menu-icon">🛍️</span> Offset Market
        </li>
        <li class="sidebar-menu-item" data-route="#iotGrid" id="menu-iot">
          <span class="menu-icon">⚡</span> Smart IoT Grid
        </li>
        <li class="sidebar-menu-item" data-route="#analytics" id="menu-analytics">
          <span class="menu-icon">📈</span> Analytics
        </li>
      </ul>
      
      <!-- User Profile Box -->
      <div class="user-profile-summary">
        <div class="avatar">EG</div>
        <div class="user-info">
          <span class="username">Eco Guardian</span>
          <span class="user-tier">Terrasense Pro</span>
        </div>
      </div>
    </aside>
    
    <!-- Central content viewport -->
    <main class="app-content">
      <div class="content-section active" id="app-viewport">
        <!-- Rendered dynamically by app.js router -->
      </div>
    </main>

  </div>

  <!-- FLOATING CHATBOT COMPONENT (TerraAI Coach) -->
  <div class="chatbot-widget">
    <!-- Popup window -->
    <div class="chat-popup" id="chat-popup">
      <div class="chat-header">
        <div class="chat-header-left">
          <div class="chat-bot-avatar">🤖</div>
          <div>
            <div class="chat-header-title">TerraAI Eco-Coach</div>
            <div class="chat-header-subtitle">● Active & Guiding</div>
          </div>
        </div>
        <button class="chat-close-x" id="chat-close">×</button>
      </div>
      
      <div class="chat-messages-container" id="chat-stream">
        <!-- Dialog messages injected here -->
      </div>
      
      <!-- Typing Indicator -->
      <div class="typing-indicator" id="chat-typing">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
      
      <div class="chat-input-bar">
        <input type="text" class="chat-input" id="chat-input-field" placeholder="Ask about 'diet' or 'home energy'...">
        <button class="chat-send-btn" id="chat-send"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
    
    <!-- Launcher Button -->
    <button class="chat-launcher-btn" id="chat-launcher" aria-label="Open Eco-Coach Chat">
      💬
    </button>
  </div>

  <!-- Chart.js and application script loading -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
